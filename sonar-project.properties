# ── SonarCloud project settings ───────────────────────────────────────────
# To activate: create a project at https://sonarcloud.io linked to
# github.com/rodriguezgonzalez/ares-cti-dashboard, then add SONAR_TOKEN
# as a GitHub Actions secret.

sonar.projectKey=rafaktor_ares-cti-dashboard
sonar.organization=rafaktor
sonar.projectName=Ares CTI Dashboard
sonar.projectVersion=1.0

# ── Source paths ──────────────────────────────────────────────────────────
sonar.sources=backend/app
sonar.tests=backend/tests
sonar.exclusions=**/node_modules/**,**/frontend/**,**/__pycache__/**,**/*.pyc

# ── Python ────────────────────────────────────────────────────────────────
sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml

# ── Encoding ──────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
